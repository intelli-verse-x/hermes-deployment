# ConfigMap holding the Hermes config bundle: config.yaml + AGENTS.md.
# Mounted at /opt/hermes/config-bundle inside the pod; entrypoint copies
# from there into /opt/data/.hermes/ on first boot.
#
# Regenerate with:
#   kubectl create configmap hermes-config-bundle -n aicart \
#     --from-file=config.yaml=config/config.yaml \
#     --from-file=AGENTS.md=config/AGENTS.md \
#     --dry-run=client -o yaml > k8s/configmap.yaml
#
# Then `kubectl apply -f k8s/configmap.yaml`.
apiVersion: v1
kind: ConfigMap
metadata:
  name: hermes-config-bundle
  namespace: aicart
data:
  config.yaml: |
    # See ./config/config.yaml in the hermes-deployment repo for the source.
    # This is regenerated by the bootstrap script.
  AGENTS.md: |
    # See ./config/AGENTS.md in the hermes-deployment repo for the source.
