# CI for Node / TypeScript repos (leantime-mcp, hermes-deployment scripts,
# Intelli-verse-X-SDK, Quizverse-web-frontend, intelliverse-x-games-platform-2).
#
# Drop into <repo>/.github/workflows/ci.yml.
name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ["20", "22"]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: detect node project
        id: detect
        run: |
          if [ -f package.json ]; then
            echo "has_pkg=true" >> $GITHUB_OUTPUT
          else
            echo "has_pkg=false" >> $GITHUB_OUTPUT
          fi
          if [ -f package-lock.json ] || [ -f yarn.lock ] || [ -f pnpm-lock.yaml ]; then
            echo "has_lock=true" >> $GITHUB_OUTPUT
          else
            echo "has_lock=false" >> $GITHUB_OUTPUT
          fi

      - name: setup node (cached)
        if: steps.detect.outputs.has_lock == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: "npm"

      - name: setup node (no cache)
        if: steps.detect.outputs.has_lock == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: deps
        if: steps.detect.outputs.has_pkg == 'true'
        run: |
          if [ -f package-lock.json ]; then npm ci --no-audit
          elif [ -f yarn.lock ]; then npm i -g yarn && yarn install --frozen-lockfile
          elif [ -f pnpm-lock.yaml ]; then npm i -g pnpm && pnpm i --frozen-lockfile
          else npm install --no-audit --no-package-lock
          fi

      - name: lint
        if: steps.detect.outputs.has_pkg == 'true'
        run: |
          if jq -e '.scripts.lint' package.json >/dev/null 2>&1; then npm run lint
          else echo "no lint script; skip"
          fi

      - name: build
        if: steps.detect.outputs.has_pkg == 'true'
        run: |
          if jq -e '.scripts.build' package.json >/dev/null 2>&1; then npm run build
          else echo "no build script; skip"
          fi

      - name: typecheck
        if: steps.detect.outputs.has_pkg == 'true'
        run: |
          if [ -f tsconfig.json ]; then npx --no-install tsc --noEmit || true
          fi

      - name: test
        if: steps.detect.outputs.has_pkg == 'true'
        run: |
          if jq -e '.scripts.test' package.json >/dev/null 2>&1; then npm test --silent --if-present
          else echo "no test script; skip"
          fi

      - name: shellcheck (if .sh files present)
        run: |
          if find . -type f -name "*.sh" -not -path "./node_modules/*" | head -1 | grep -q .; then
            sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
            find . -type f -name "*.sh" -not -path "./node_modules/*" -print0 \
              | xargs -0 -n1 shellcheck -S warning || true
          fi

      - name: yamllint (if .yml files present)
        run: |
          if find . -type f \( -name "*.yml" -o -name "*.yaml" \) -not -path "./node_modules/*" -not -path "./.git/*" | head -1 | grep -q .; then
            pip install yamllint
            yamllint -d "{extends: relaxed, rules: {line-length: disable}}" . || true
          fi

  audit:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4
      - name: skip if no package.json
        id: detect
        run: |
          if [ -f package.json ]; then
            echo "has_pkg=true" >> $GITHUB_OUTPUT
          else
            echo "has_pkg=false" >> $GITHUB_OUTPUT
          fi
      - uses: actions/setup-node@v4
        if: steps.detect.outputs.has_pkg == 'true'
        with: { node-version: "22" }
      - name: npm audit (high+ only)
        if: steps.detect.outputs.has_pkg == 'true'
        run: npm audit --audit-level=high || true
