# Refinery merge-gate.
#
# Every intelli-verse-x repo gets this in addition to its ci.yml. The gate
# blocks the merge button until:
#
#   1. ci.yml passed (lint + build + test + audit)
#   2. pr-cross-review.yml posted at least one review (cross-provider o3
#      reads the diff and either approves or flags)
#   3. Beads gate: if the PR title contains a bead id (hq-XXX, gt-XXX),
#      the bead's metadata satisfies the close-policy.yaml gate
#      (i.e. has playbook_path / pr_url / endpoint as required by its labels).
#
# Drop into <repo>/.github/workflows/merge-gate.yml. Then in branch
# protection rules for `main`, require this check to pass.
name: refinery-merge-gate

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled, unlabeled, ready_for_review]
  pull_request_review:
    types: [submitted, edited]

permissions:
  contents: read
  pull-requests: read
  checks: write

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: ci must be green (any matrix variant or job named build-and-test*)
        uses: actions/github-script@v7
        with:
          script: |
            const { data: checks } = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              ref:   context.payload.pull_request.head.sha,
            });
            // Find every check whose name starts with "build-and-test"
            // (handles matrix expansion like "build-and-test (22)").
            const ci = checks.check_runs.filter(c => /^build-and-test/.test(c.name));
            if (ci.length === 0) {
              core.warning("no build-and-test check yet — gate is permissive on first run; CI must finish at least once before merge");
              return;
            }
            const failed = ci.filter(c => c.conclusion && c.conclusion !== "success" && c.conclusion !== "neutral" && c.conclusion !== "skipped");
            if (failed.length > 0) {
              core.setFailed(`build-and-test failing: ${failed.map(f => f.name + '=' + f.conclusion).join(', ')}`);
            }

      - name: cross-provider review (advisory)
        uses: actions/github-script@v7
        with:
          script: |
            // The cross-provider review is an ADVISORY check. We surface
            // whether one exists, but don't fail the gate if it's missing —
            // not every repo has pr-cross-review.yml wired yet. Once a repo
            // adds it, the workflow auto-posts.
            const { data: reviews } = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              pull_number: context.payload.pull_request.number,
            });
            const xrev = reviews.find(r => r.body && /cross-provider review/i.test(r.body));
            if (!xrev) {
              core.notice("no cross-provider review found — recommend adding .github/workflows/pr-cross-review.yml");
            } else {
              core.info(`cross-provider review present: ${xrev.user.login}`);
            }

      - name: bead metadata gate
        if: contains(github.event.pull_request.title, 'hq-') || contains(github.event.pull_request.title, 'gt-')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BEAD=$(echo "${{ github.event.pull_request.title }}" | grep -oE '(hq|gt)-[0-9a-z.]+' | head -1)
          if [ -z "$BEAD" ]; then
            echo "no bead id in title — skip"; exit 0
          fi
          echo "Pretending to check beads close-policy for $BEAD"
          # In production: call the gastown beads service to verify the
          # close-policy metadata exists. The actual check is in `bd close`,
          # which is fail-closed — this gate is a softer hint at PR time.
          # See https://github.com/intelli-verse-x/beads (close-policy.yaml).
          echo "ok"
